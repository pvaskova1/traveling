{% load static %}

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CK Dobrodruh{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'traveling_app/style.css' %}">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="{% url 'index' %}" class="logo">
                <span class="logo-icon">✦</span>
                <span>CK Dobrodruh</span>
            </a>

            
        <div class="nav-links">
    <a href="{% url 'index' %}">Úvod</a>
    <a href="{% url 'index' %}#onas">O nás</a>
    <a href="{% url 'seznam_zajezdu' %}">Zájezdy</a>
    <a href="{% url 'index' %}#fotogalerie">Fotogalerie</a>
    <a href="{% url 'index' %}#kontakt">Kontakt</a>

    {% if user.is_authenticated %}
        <span class="nav-user">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit">Odhlásit</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Přihlášení</a>
    {% endif %}
</div>
    </header>

    {% block content %}
    {% endblock %}
</body>
</html>

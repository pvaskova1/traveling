{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK DOBRODRUH</title>
    <!-- Bootstrap & Ikony -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Tvůj static CSS -->
    <link rel="stylesheet" href="{% static 'traveling_app/css/style.css' %}">
    <style>
        /* Rychlá oprava mezer přímo v layoutu */
        body { background-color: #f8f9fa; }
        header { margin-bottom: 0 !important; border-bottom: 1px solid #dee2e6; }
        .navbar-brand { color: #003580 !important; font-weight: 800; letter-spacing: -0.5px; }
    </style>
</head>
<body>

<header class="bg-white py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <!-- Logo -->
        <a class="navbar-brand fs-3 text-decoration-none" href="/">CK DOBRODRUH</a>

        <!-- Pravá strana (Lupa, Účet, Menu) -->
        <div class="d-flex align-items-center gap-4 text-dark">
            <div class="d-none d-lg-block small fw-bold">
                <i class="bi bi-telephone"></i> 255 787 787
            </div>
            <a href="#" class="text-dark"><i class="bi bi-search"></i></a>
            <a href="/login/" class="text-dark text-decoration-none d-flex align-items-center gap-1">
                <i class="bi bi-person fs-4"></i>
                <span class="fw-bold">{% if user.is_authenticated %}{{ user.username }}{% else %}admin{% endif %}</span>
            </a>
            <a href="#" class="text-dark d-flex align-items-center gap-2 text-decoration-none">
                <i class="bi bi-list fs-3"></i>
                <span class="fw-bold">Menu</span>
            </a>
        </div>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

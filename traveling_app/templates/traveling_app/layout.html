{% load static %}

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cestovní agentura{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'traveling_app/style.css' %}">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="{% url 'index' %}" class="logo">Cestovní agentura</a>

            <div class="nav-links">
                <a href="{% url 'index' %}">Domů</a>
                <a href="{% url 'seznam_zajezdu' %}">Všechny zájezdy</a>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Cestovní agentura</p>
    </footer>
</body>
</html>

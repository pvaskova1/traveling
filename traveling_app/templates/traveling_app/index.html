{% extends 'base.html' %}

{% block content %}

<section class="hero">

    <div class="hero-overlay">

        <h1>Vyberte si svou vysněnou dovolenou</h1>

        <form action="{% url 'seznam_zajezdu' %}" method="get">

            <input
                type="text"
                name="destinace"
                placeholder="Kam chcete letět?">

            <select name="doprava">

                <option value="">
                    Doprava
                </option>

                <option value="Letadlo">
                    Letadlo
                </option>

                <option value="Autobus">
                    Autobus
                </option>

            </select>

            <button type="submit">
                Hledat
            </button>

        </form>

    </div>

</section>

{% endblock %}
